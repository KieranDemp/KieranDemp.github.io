<!DOCTYPE html>
<html>
<head>
  <title>My Cool Website</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      color: white;
      text-align: center;
    }

    .container {
      padding-top: 100px;
    }

    h1 {
      font-size: 50px;
      margin-bottom: 10px;
    }

    p {
      font-size: 20px;
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 16px;
    }

    button:hover {
      background: black;
      color: white;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Welcome 👋</h1>
    <p>This is my GitHub Pages website</p>

    <button onclick="alert('You clicked the button!')">
      Click Me
    </button>
  </div>
</body>
</html>
